# Open Design — Coolify deployment (BUILD FROM SOURCE, single shared login)
# =============================================================================
# This file lives in a FORK of nexu-io/open-design so Coolify can BUILD the app
# from source. The upstream prebuilt image (ghcr.io/nexu-io/od) is PRIVATE / not
# anonymously pullable, so we build deploy/Dockerfile on the server instead of
# pulling. (openclaw has plenty of RAM/CPU for the build.)
#
# Open Design is local-first and ships NO multi-user auth — access is a single
# shared gate: Coolify Basic Auth in front of the domain.
#
# PORTS:
#   - No `ports:` — Coolify's Traefik owns the public 443/80 entry point.
#   - `expose: "7456"` declares the internal container port for Traefik (NOT a
#     host publish). The domain -> container:7456 mapping is set in the Coolify
#     dashboard, matching the ai-receptionist / ai-influencer pattern.
#
# AUTH:
#   - OD_DISABLE_API_AUTH=1 makes the daemon trust the proxy; Coolify Basic Auth
#     is the authenticator. MANDATORY or the instance is publicly open.
#
# COOLIFY SETUP
#   1. Docker Compose resource -> Git source = omniwave-ai/open-design,
#      branch main, Compose Location = /docker-compose.coolify.yml.
#   2. Domains field: https://design.example.com:7456  (:7456 = container port;
#      public stays on 443).
#   3. Env var: OD_ALLOWED_ORIGINS = your exact https origin (no port, no slash).
#   4. Add Basic Auth (Traefik basic-auth middleware label). MANDATORY.
#   5. Deploy — first build is ~10-15 min (pnpm install + Next build).
#
# UPDATING: click GitHub's "Sync fork" button on omniwave-ai/open-design to pull
# new upstream releases (this single file does not conflict), then Redeploy.
# =============================================================================

services:
  opendesign:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - OD_BIND_HOST=0.0.0.0        # listen on all interfaces inside the container
      - OD_PORT=7456                # container port the daemon serves UI + API on
      - OD_WEB_PORT=7456
      # Set OD_ALLOWED_ORIGINS in the Coolify dashboard to your exact public
      # origin (https://your-domain, no port). Browser /api calls whose Origin
      # doesn't match are rejected.
      - OD_ALLOWED_ORIGINS=${OD_ALLOWED_ORIGINS}
      # Trust Coolify's proxy as the authenticator (Basic Auth gates the domain).
      - OD_DISABLE_API_AUTH=1
      - NODE_OPTIONS=--max-old-space-size=192
      # Optional: only if Codex runs fail with workspace-write sandbox errors in
      # an unprivileged container (trusted single-user deployments only).
      # - OD_CODEX_SANDBOX=danger-full-access
    expose:
      - "7456"                     # internal port for Traefik; NOT published to host
    volumes:
      - open_design_data:/app/.od  # persistent daemon data (SQLite, projects, artifacts)
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s    # heavy first boot (150+ design systems/skills baked in)
    security_opt:
      - no-new-privileges:true

volumes:
  open_design_data:
