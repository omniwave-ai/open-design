# Open Design — Coolify deployment (build from source, single shared login)
# =============================================================================
# Builds from this fork (the upstream prebuilt image is private). Runs behind
# Coolify's Traefik proxy; the single shared gate is Coolify Basic Auth.
#
# LOCAL CODING AGENTS (mounted, NOT baked into the image)
#   Open Design detects an agent only when its CLI BINARY is on PATH. The image
#   ships none, so we mount them from the host instead of rebuilding:
#     1. Install on the host (musl build, matches the Alpine runtime):
#          sudo docker run --rm -v /opt/od-agents:/agents node:24-alpine \
#            sh -lc 'npm i -g opencode-ai --prefix /agents'
#          sudo chmod -R a+rX /opt/od-agents
#     2. It's mounted read-only at /agents and /agents/bin is on PATH -> detected.
#     3. HOME points at a writable dir in the data volume for the CLI's config/auth.
#     4. Set a provider key in Coolify env (ANTHROPIC_API_KEY / OPENAI_API_KEY /
#        OPENROUTER_API_KEY) so the CLI can call models.
#   Add more Node/musl CLIs later by `npm i -g <pkg> --prefix /agents` (e.g.
#   @anthropic-ai/claude-code, @google/gemini-cli, @qwen-code/qwen-code, @github/copilot).
#
# PORTS: no host `ports:`; `expose: 7456` is the internal port; the domain ->
#   container:7456 mapping is set in the Coolify dashboard (https://domain:7456).
# AUTH: OD_DISABLE_API_AUTH=1 + Coolify Basic Auth is the ONLY gate (mandatory).
# =============================================================================

services:
  opendesign:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: always
    # Single shared login (Basic Auth) at the Traefik proxy — the only gate
    # (OD_DISABLE_API_AUTH=1). Hardcoded bcrypt hash for user "designer".
    # NOTE: Coolify passes label values verbatim (it escapes `$` for you), so the
    # hash uses SINGLE `$` here — do NOT double to `$$`. Regenerate with:
    #   htpasswd -nbB designer '<newpassword>'
    # The `coolify.traefik.middlewares` shorthand attaches this middleware to the
    # service's router automatically (alongside gzip) — no router name needed.
    labels:
      - "traefik.http.middlewares.od-auth.basicauth.users=designer:$2b$10$vSEAam6cPUuIstDJ0XxcUuzplbzg5C/mR8/1G6z9HbBmvP0snREtG"
      - "coolify.traefik.middlewares=od-auth"
    environment:
      - NODE_ENV=production
      - OD_BIND_HOST=0.0.0.0
      - OD_PORT=7456
      - OD_WEB_PORT=7456
      - OD_ALLOWED_ORIGINS=${OD_ALLOWED_ORIGINS}
      - OD_DISABLE_API_AUTH=1
      - NODE_OPTIONS=--max-old-space-size=512
      # Writable HOME inside the data volume (owned by the app user) — where the
      # mounted CLIs store config/auth. Kept off the read-only /agents mount.
      # Safe: the daemon's data dir is /app/.od (projectRoot-based, not HOME).
      - HOME=/app/.od/agent-home
      # Put the mounted CLI bin dir on PATH so agent detection finds opencode.
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/agents/bin
      # Provider keys for the agent CLIs — set whichever you use in Coolify env.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Codex cannot create its workspace-write sandbox in an unprivileged
      # container, so run it full-access (trusted single-user deployment).
      - OD_CODEX_SANDBOX=danger-full-access
    expose:
      - "7456"
    volumes:
      - open_design_data:/app/.od
      # Coding-agent CLIs installed on the host at /opt/od-agents (read-only).
      - /opt/od-agents:/agents:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true

volumes:
  open_design_data:
